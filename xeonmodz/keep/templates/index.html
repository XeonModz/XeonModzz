<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝚾𝛆𝛐𝛈𝚳𝛐𝛛𝐳</title>

<meta name="theme-color" content="#06c1db">
<meta name="description" content="Nothing Here">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
    text-align: center;
}

h1 {
    font-size: clamp(40px, 8vw, 90px);
    color: #fff;
    margin-bottom: 10px;
}

.description {
    color: #888;
    margin-bottom: 25px;
}

.stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.card {
    background: #111;
    border: 1px solid #06c1db;
    border-radius: 15px;
    padding: 20px;
    min-width: 250px;
    box-shadow: 0 0 15px rgba(6, 193, 219, 0.25);
}

.card h3 {
    color: #06c1db;
    margin-bottom: 10px;
    font-size: 16px;
}

.card p {
    color: #fff;
    font-size: 15px;
    word-break: break-word;
}

.issue {
    margin-top: 20px;
    color: #aaa;
    font-size: 14px;
}

.issue a {
    color: #06c1db;
    text-decoration: none;
    font-weight: bold;
}

.issue a:hover {
    text-decoration: underline;
}

footer {
    text-align: center;
    padding: 15px;
    color: #888;
    border-top: 1px solid #111;
}

@media(max-width:768px) {
    .card {
        min-width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>𝚾𝛆𝛐𝛈𝚳𝛐𝛛𝐳</h1>

    <p class="description">API Server Online</p>

    <div class="stats">

        <div class="card">
            <h3> OS BOOT TIME </h3>
            <p>{{ os_uptime }}</p>
        </div>

        <div class="card">
            <h3> SERVER UPTIME </h3>
            <p>{{ uptime }}</p>
        </div>

    </div>

    <div class="issue">
        Having issue?
        <a href="https://xeonmodz-online.onrender.com" target="_blank">
            Will Fix Soon
        </a>
    </div>

</div>

<footer>
    © 2026 𝚾𝛆𝛐𝛈𝚳𝛐𝛛𝐳
</footer>

</body>
</html>
